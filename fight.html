<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight</title>
    <link href="style/fight.css" rel="stylesheet" />
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/fight.js"></script>
</head>
<body>
    <div class="batlefield">
        <div class="hero">
            <div class="name">HeroName</div>
            <div class="info hp-container">
                <span class="hp-current">10</span>
                /
                <span class="hp-max">20</span></div>
            <div class="info mp-container">30/40</div>
            <div class="actions">
                <div class="magic magic-air"></div>
                <div class="magic magic-ground"></div>
                <div class="magic magic-fire"></div>
                <div class="magic magic-water"></div>
            </div>

        </div>
        <div class="result"></div>
        <div class="enemies"></div>
    </div>
</body>
</html>
