<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fight</title>
    <link href="style/fight.css" rel="stylesheet" />
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/fight.js"></script>
</head>

<body>
    <div class="batlefield">
        <div class="hero">
            <div class="name">HeroName</div>
            <div class="info hp-container">
                <span class="hp-current">10</span>
                /
                <span class="hp-max">20</span>
            </div>
            <div class="info mp-container">
                <span class="mp-current">10</span>
                /
                <span class="mp-max">20</span>
            </div>
            <div class="actions">
                <div class="magic magic-air"></div>
                <div class="magic magic-ground"></div>
                <div class="magic magic-fire"></div>
                <div class="magic magic-water"></div>
            </div>
        </div>
        <div class="result">
            <div class="log-container">
                <div class="log-record">Action 1</div>
                <div class="log-record">Action 2</div>
                <div class="log-record">Action 3</div>
            </div>

            <div class="fight confirm">БОЛЬШАЯ КНОПКА</div>
        </div>
        <div class="enemies">
            <div class="enemy-container template">
                <div class="stats">
                    <span>MP:</span><span class="hp-enemy">-50</span>
                    <span> | HP:</span><span class="mp-enemy">-50</span>
                </div>
                <img class="enemy" src="" />
            </div>

            <!-- <img class="enemy" src="img/monsters/monster1.jpg" />
            <img class="enemy" src="img/monsters/monster2.jpg" />
            <img class="enemy" src="img/monsters/monster3.jpg" />
            <img class="enemy" src="img/monsters/monster4.jpg" />
            <img class="enemy" src="img/monsters/monster5.jpg" /> -->
        </div>
    </div>
</body>

</html>
